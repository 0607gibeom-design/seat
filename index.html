```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seat Picker</title>

<style>

body{
margin:0;
background:white;
font-family:sans-serif;
}

#controls{
position:fixed;
top:20px;
right:20px;
background:white;
padding:10px;
border:1px solid #ccc;
}

button{
margin-top:5px;
width:100%;
}

.circle{
position:absolute;
width:70px;
height:70px;
border:3px solid black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
transform:translate(-50%,-50%);
}

</style>

</head>

<body>

<div id="controls">
제외 번호<br>
<input id="exclude" placeholder="예: 2,5,7"><br>
<button onclick="undo()">Undo</button>
<button onclick="randomSeat()">Random</button>
</div>

<script>

let current=1
let circles=[]

function getExclude(){

let text=document.getElementById("exclude").value

if(text.trim()=="") return []

return text.split(",").map(n=>parseInt(n.trim()))

}

function nextNumber(){

let exclude=getExclude()

while(exclude.includes(current)){
current++
}

return current

}

function createCircle(x,y){

let num=nextNumber()

let circle=document.createElement("div")
circle.className="circle"
circle.innerText=num

circle.style.left=x+"px"
circle.style.top=y+"px"

document.body.appendChild(circle)

circles.push(circle)

current++

}

document.addEventListener("click",function(e){

if(e.target.tagName==="INPUT" || e.target.tagName==="BUTTON") return

createCircle(e.pageX,e.pageY)

})

function undo(){

let last=circles.pop()

if(last){
last.remove()
current--
}

}

function randomSeat(){

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

createCircle(x,y)

}

</script>

</body>
</html>
